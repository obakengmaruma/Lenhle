<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>
    <style>
        /* --- BACKGROUND AND GENERAL STYLES --- */
        body {
            background-color: #e6ccff; /* Soft blank purple background */
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #333;
            margin: 0; 
            overflow-x: hidden; 
        }

        /* --- THE START SCREEN STYLES --- */
        #start-screen {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* The mountain picture is now on the start screen */
            background-image: url('background.jpeg');
            background-size: cover; 
            background-position: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000; 
        }
        
        #start-screen h1 {
            color: white; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* Shadow makes it readable over the trees */
            font-size: 3em;
        }

        #start-btn {
            font-size: 1.5em;
            padding: 15px 40px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            margin-top: 20px;
        }

        #start-btn:hover {
            background-color: #b02a6b; 
            transform: scale(1.05); 
        }

        /* --- THE MAIN CONTENT STYLES --- */
        #main-content {
            display: none; 
            padding: 50px;
        }

        #main-content h1 {
            color: #d63384;
            font-size: 3em;
        }

        .bounce-name {
            color: #800080; /* Darker purple for her bouncing name */
            display: inline-block; 
            animation: bounce 1.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .photo-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            margin: 20px 0;
        }

        .music-player {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>I have a surprise for you...</h1>
        <button id="start-btn">Click to Open 🎁</button>
    </div>

    <div id="main-content">
        <h1>Happy Birthday, <span class="bounce-name">Lenhle</span>! 🎂</h1>
        
        <p>I made this special page just for you. I hope you have the most amazing day!</p>

        <div class="photo-container">
            <img src="pic2.jpeg" alt="A lovely picture of ur amazingness" width="500">
        </div>

        <div class="music-player">
            <p>🎵 Playing our special song 🎵</p>
            <audio id="birthdaySong" controls loop>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            
            // 1. Hide the start screen and show the main birthday page
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 2. Play the song immediately
            var audio = document.getElementById('birthdaySong');
            audio.play().catch(function(error) {
                console.log("Browser still blocked audio:", error);
            });

            // 3. Fire the confetti immediately
            confetti({
                particleCount: 250, 
                spread: 180, 
                origin: { y: 0.1 }, 
                colors: ['#d63384', '#800080', '#ffffff', '#ffeb3b'] 
            });
        });
    </script>

</body>
</html>
