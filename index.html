<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>

    <!-- handwritten font -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #e6ccff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #333;
            margin: 0; 
            overflow: hidden;
        }

        #start-screen {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpeg');
            background-size: cover; 
            background-position: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000; 
            overflow: hidden;
        }
        
        #start-screen h1 {
            color: white; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); 
            font-size: 3em;
            z-index: 1010;
        }

        #start-btn {
            font-size: 1.5em;
            padding: 15px 40px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            margin-top: 20px;
            z-index: 1010;
        }

        #start-btn:hover {
            background-color: #b02a6b; 
            transform: scale(1.05); 
        }

        /* FLOATING HEARTS (UNCHANGED) */
        .floating-heart {
            position: absolute;
            bottom: -50px;
            cursor: pointer;
            user-select: none;
            animation: floatUp linear forwards;
            z-index: 1005;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh); }
        }

        .pop {
            transform: scale(3) !important;
            opacity: 0 !important;
        }

        #main-content {
            display: none; 
            padding: 50px;
            height: 100vh;
            overflow-y: auto;
        }

        #main-content h1 {
            color: #d63384;
            font-size: 3em;
        }

        .bounce-name {
            color: #800080; 
            display: inline-block; 
            animation: bounce 1.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* PHOTO + LETTER STACK */
        .photo-letter-wrapper {
            position: relative;
            width: 500px;
            margin: 20px auto;
        }

        #birthdayPhoto {
            width: 100%;
            border-radius: 15px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            transition: opacity 2s ease;
        }

        /* PAPER LETTER (UNCHANGED STYLE) */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 90%;
            height: 90%;
            padding: 25px;
            background: linear-gradient(135deg, #fffdf7, #fdf1e6);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25),
                        inset 0 0 10px rgba(0,0,0,0.05);
            text-align: left;
            opacity: 0;
            transition: opacity 2s ease, transform 1s ease;
            overflow-y: auto;
            transform: rotate(-2deg) scale(0.95);
            font-family: 'Dancing Script', cursive;
            z-index: 1;
        }

        .letter.show {
            transform: rotate(0deg) scale(1);
        }

        /* MUSIC PLAYER (UNCHANGED) */
        .music-player {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        /* DONE BUTTON */
        #doneBtn {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2em;
            background: #ff4da6;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        /* MEMORY PHOTOS */
        .memory-photo {
            position: fixed;
            width: 150px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: popIn 0.5s ease forwards;
            z-index: 2000;
        }

        @keyframes popIn {
            from { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }
    </style>
</head>

<body>

<div id="start-screen">
    <h1>I have a surprise for you...</h1>
    <h1>TAP THE HEARTS❤️❤️</h1>
    <button id="start-btn">Click to Open 😁🎁</button>
</div>

<div id="main-content">
    <h1>Happy Birthday, <span class="bounce-name">Lenhle</span>! 🎂</h1>

    <div class="photo-letter-wrapper">
        <div class="letter" id="letter">
            <h2>💌 A Letter For You</h2>
            <p>
                My dearest Lenhle,<br><br>
                From the moment you came into my life, everything felt brighter...
            </p>
        </div>

        <img id="birthdayPhoto" src="pic2.jpeg">
    </div>

    <div class="music-player">
        <audio id="birthdaySong" controls loop>
            <source src="Ttrack.mp3" type="audio/mpeg">
        </audio>
    </div>

    <button id="doneBtn">Done Reading ❤️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let heartInterval;

/* HEARTS STILL WORK */
function createHeart() {
    const startScreen = document.getElementById('start-screen');
    const heart = document.createElement('div');

    const hearts = ['❤️','💖','💕','💗'];
    heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

    heart.classList.add('floating-heart');
    heart.style.left = Math.random()*100 + 'vw';
    heart.style.fontSize = (Math.random()*20+20)+'px';

    const duration = Math.random()*3+4;
    heart.style.animationDuration = duration+'s';

    heart.onclick = () => {
        heart.classList.add('pop');
        setTimeout(()=>heart.remove(),200);
    };

    startScreen.appendChild(heart);

    setTimeout(()=>{ if(heart.parentElement) heart.remove(); }, duration*1000);
}

heartInterval = setInterval(createHeart,400);

document.getElementById('start-btn').onclick = function(){

    clearInterval(heartInterval);

    document.getElementById('start-screen').style.display='none';
    document.getElementById('main-content').style.display='block';

    document.getElementById('birthdaySong').play().catch(()=>{});

    confetti({particleCount:250,spread:180});

    setTimeout(()=>{
        document.getElementById('letter').style.opacity='1';
        document.getElementById('letter').classList.add('show');
        document.getElementById('birthdayPhoto').style.opacity='0.4';

        document.getElementById('doneBtn').style.display='inline-block';
    },3000);
};

/* PHOTO EXPLOSION */
const photos = ["pic1.jpeg","pic2.jpeg","pic3.jpeg","pic4.jpeg"];

document.getElementById('doneBtn').onclick = function(){

    confetti({particleCount:300,spread:200});

    let i=0;
    let interval=setInterval(()=>{
        const img=document.createElement('img');
        img.src=photos[Math.floor(Math.random()*photos.length)];
        img.className="memory-photo";

        img.style.top=Math.random()*90+"vh";
        img.style.left=Math.random()*90+"vw";

        document.body.appendChild(img);

        i++;
        if(i>25) clearInterval(interval);

    },200);
};
</script>

</body>
</html>
