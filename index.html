<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #e6ccff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #333;
            margin: 0; 
            overflow: hidden;
        }

        #start-screen {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpeg');
            background-size: cover; 
            background-position: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000; 
            overflow: hidden;
        }

        #start-btn {
            font-size: 1.5em;
            padding: 15px 40px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh); }
        }

        #main-content {
            display: none; 
            padding: 50px;
            height: 100vh;
        }

        .photo-letter-wrapper {
            position: relative;
            width: 500px;
            margin: 20px auto;
        }

        #birthdayPhoto {
            width: 100%;
            border-radius: 15px; 
            position: relative;
            z-index: 2;
        }

        .letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 25px;
            background: linear-gradient(135deg, #fffdf7, #fdf1e6);
            border-radius: 10px;
            opacity: 0;
            display: none;
            font-family: 'Dancing Script', cursive;
        }

        .letter.show {
            display: block;
            opacity: 1;
        }

        /* SIDE CONTROLS */
        .controls {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2000;
        }

        .left-controls { left: 20px; }
        .right-controls { right: 20px; }

        .control-btn {
            display: block;
            margin: 15px 0;
            font-size: 2em;
            background: #ff4da6;
            border: none;
            border-radius: 50%;
            padding: 15px;
            cursor: pointer;
            color: white;
        }

        /* AUDIO SLIDER ONLY */
        #audioControl {
            position: fixed;
            bottom: 10px;
            width: 100%;
        }

        /* OVERLAY + VIDEO (UNCHANGED) */
        #photo-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            display: none;
            background: black;
            z-index: 3000;
        }

        .memory-photo {
            position: absolute;
            border-radius: 10px;
        }

        #finalVideo {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 4000;
            opacity: 0;
            transition: 1.5s;
        }

        #finalVideo.show { opacity: 1; }
    </style>
</head>

<body>

<div id="start-screen">
    <h1>TAP THE HEARTS ❤️</h1>
    <button id="start-btn">Start 🎁</button>
</div>

<div id="main-content">
    <h1>Happy Birthday Lenhle 🎂</h1>

    <div class="photo-letter-wrapper">
        <img id="birthdayPhoto" src="pic2.jpeg">

        <div class="letter" id="letter">
            <h2>💌 A Letter For You</h2>
            <p>
                My dearest Lenhle,<br><br>
                TURNING 20 🥳🥳🥳<br><br> 
                You deserve all the happiness in the world ❤️
            </p>
        </div>
    </div>
</div>

<!-- CONTROLS -->
<div class="controls left-controls">
    <button class="control-btn" id="backBtn">⏮</button>
</div>

<div class="controls right-controls">
    <button class="control-btn" id="playPauseBtn">⏯</button>
    <button class="control-btn" id="nextBtn">⏭</button>
</div>

<!-- AUDIO (hidden but slider shown) -->
<audio id="birthdaySong" loop>
    <source src="Ttrack.mp3" type="audio/mpeg">
</audio>

<input type="range" id="audioControl" min="0" max="1" step="0.01">

<div id="photo-overlay"></div>

<video id="finalVideo">
    <source src="vid1.mp4" type="video/mp4">
</video>

<script>
let heartInterval;

function createHeart() {
    const heart = document.createElement('div');
    heart.innerHTML = "❤️";
    heart.classList.add('floating-heart');
    heart.style.left = Math.random()*100 + 'vw';
    heart.style.animationDuration = "5s";
    document.getElementById('start-screen').appendChild(heart);
}

heartInterval = setInterval(createHeart,400);

document.getElementById('start-btn').onclick = function(){
    clearInterval(heartInterval);
    document.getElementById('start-screen').style.display='none';
    document.getElementById('main-content').style.display='block';

    const audio = document.getElementById('birthdaySong');
    audio.play().catch(()=>{});

    // sync slider
    const slider = document.getElementById('audioControl');
    slider.oninput = () => audio.volume = slider.value;
    slider.value = 1;
};

// BUTTONS
const photo = document.getElementById('birthdayPhoto');
const letter = document.getElementById('letter');
const audio = document.getElementById('birthdaySong');

document.getElementById('nextBtn').onclick = () => {
    photo.style.display = "none";
    letter.classList.add("show");
};

document.getElementById('backBtn').onclick = () => {
    photo.style.display = "block";
    letter.classList.remove("show");
};

document.getElementById('playPauseBtn').onclick = () => {
    if(audio.paused) audio.play();
    else audio.pause();
};
</script>

</body>
</html>
