<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #5a2a82; /* PURPLE BACKGROUND */
            overflow: hidden;
            text-align: center;
        }

        /* START SCREEN */
        #start-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('background.jpeg') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5em;
            border-radius: 50px;
            background: #ff4da6;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* MAIN CONTENT */
        #main-content {
            display: none;
            padding-top: 40px;
        }

        /* MUSIC CARD */
        .music-card {
            width: 300px;
            margin: auto;
            background: #2e1a47;
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .music-card img {
            width: 100%;
            border-radius: 15px;
        }

        .song-title {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .artist {
            color: #aaa;
            font-size: 0.9em;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 2em;
        }

        .controls button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 15px;
        }

        /* PHOTO + LETTER */
        .photo-letter-wrapper {
            position: relative;
            width: 300px;
            margin: 30px auto;
        }

        #birthdayPhoto {
            width: 100%;
            border-radius: 15px;
        }

        .letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: none;
            font-family: 'Dancing Script';
        }

        /* OVERLAY + VIDEO */
        #photo-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            display: none;
            background: black;
            z-index: 3000;
        }

        .memory-photo {
            position: absolute;
            border-radius: 10px;
        }

        #finalVideo {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 4000;
            opacity: 0;
            transition: 1.5s;
        }

        #finalVideo.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div id="start-screen">
    <h1 style="color:white;">Tap to Start ❤️</h1>
    <button id="start-btn">Open 🎁</button>
</div>

<div id="main-content">

    <!-- MUSIC PLAYER UI -->
    <div class="music-card">
        <img src="pic2.jpeg">

        <div class="song-title">Happy Birthday Lenhle 🎂❤️</div>
        <div class="artist">From Me 💖</div>

        <input type="range" id="audioControl" min="0" max="1" step="0.01">

        <div class="controls">
            <button id="backBtn">⏮</button>
            <button id="playPauseBtn">⏯</button>
            <button id="nextBtn">⏭</button>
        </div>
    </div>

    <!-- PHOTO + LETTER -->
    <div class="photo-letter-wrapper">
        <img id="birthdayPhoto" src="pic2.jpeg">

        <div class="letter" id="letter">
            <h3>💌</h3>
            Happy Birthday Lenhle ❤️<br><br>
            You deserve everything beautiful in this world 💖
        </div>
    </div>

</div>

<!-- AUDIO -->
<audio id="birthdaySong" loop>
    <source src="Ttrack.mp3" type="audio/mpeg">
</audio>

<div id="photo-overlay"></div>

<video id="finalVideo">
    <source src="vid1.mp4">
</video>

<script>
let heartInterval;

// START BUTTON
document.getElementById('start-btn').onclick = function(){
    document.getElementById('start-screen').style.display='none';
    document.getElementById('main-content').style.display='block';

    const audio = document.getElementById('birthdaySong');
    audio.play().catch(()=>{});

    const slider = document.getElementById('audioControl');
    slider.value = 1;
    slider.oninput = () => audio.volume = slider.value;
};

// CONTROLS
const audio = document.getElementById('birthdaySong');
const photo = document.getElementById('birthdayPhoto');
const letter = document.getElementById('letter');

document.getElementById('playPauseBtn').onclick = () => {
    if(audio.paused) audio.play();
    else audio.pause();
};

document.getElementById('nextBtn').onclick = () => {
    photo.style.display = "none";
    letter.style.display = "block";
};

document.getElementById('backBtn').onclick = () => {
    photo.style.display = "block";
    letter.style.display = "none";
};

// KEEP YOUR EXPLOSION + VIDEO
document.getElementById('playPauseBtn').ondblclick = function(){

    const overlay = document.getElementById('photo-overlay');
    overlay.style.display = "block";

    const photos = ["pic3.jpeg","pic4.jpeg","pic1.jpeg","pic7.jpeg","pic6.jpeg","pic5.jpeg"];

    let i=0;
    let interval=setInterval(()=>{

        const img=document.createElement('img');
        img.src=photos[Math.floor(Math.random()*photos.length)];
        img.className="memory-photo";

        img.style.top=Math.random()*90+"%";
        img.style.left=Math.random()*90+"%";
        img.style.width=(Math.random()*200+100)+"px";

        overlay.appendChild(img);

        i++;
        if(i>40){
            clearInterval(interval);

            setTimeout(()=>{
                overlay.style.display="none";

                const video=document.getElementById('finalVideo');
                video.style.display="block";
                video.currentTime=0;

                setTimeout(()=>{
                    video.classList.add("show");
                    video.play();
                },100);

            },1500);
        }

    },100);
};
</script>

</body>
</html>
