<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>
    <style>
        body {
            background-image: url('background.jpeg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
            color: #333;
            overflow-x: hidden; /* Stops the screen from scrolling sideways from confetti */
        }
        h1 {
            color: #d63384;
            font-size: 3em;
        }

        .bounce-name {
            color: purple;
            display: inline-block; 
            animation: bounce 1.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px); 
            }
        }

        .photo-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            margin: 20px 0;
        }
        .music-player {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>Happy Birthday, <span class="bounce-name">Lenhle</span>! 🎂</h1>
    
    <p>I made this special page just for you. I hope you have the most amazing day!</p>

    <div class="photo-container">
        <img src="pic2.jpeg" alt="A lovely picture of ur amazingness" width="500">
    </div>

    <div class="music-player">
        <p>🎵 Press play for a special song 🎵</p>
        <audio controls autoplay loop>
            <source src="Bruno Mars - Versace On The Floor.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // This tells the browser to fire the confetti as soon as the page loads
        window.onload = function() {
            confetti({
                particleCount: 250, // How many pieces of confetti
                spread: 180, // How wide they spread out
                origin: { y: 0.1 }, // Starts near the top of the screen
                colors: ['#d63384', '#800080', '#ffffff', '#ffeb3b'] // Pink, Purple, White, and Yellow
            });
        };
    </script>
    </body>
</html>
