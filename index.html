<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #e6ccff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        #main-content {
            display: none;
            padding: 50px;
            height: 100vh;
            overflow-y: auto;
        }

        #start-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('background.jpeg') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5em;
            background: #d63384;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .photo-letter-wrapper {
            position: relative;
            width: 500px;
            margin: auto;
        }

        #birthdayPhoto {
            width: 100%;
            border-radius: 15px;
            z-index: 2;
            position: relative;
            transition: opacity 2s ease;
        }

        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 90%;
            height: 90%;
            padding: 25px;
            background: linear-gradient(135deg, #fffdf7, #fdf1e6);
            border-radius: 10px;
            opacity: 0;
            transition: 2s;
            font-family: 'Dancing Script', cursive;
            z-index: 1;
        }

        .letter.show { opacity: 1; }

        /* ❤️ DONE BUTTON */
        #doneBtn {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2em;
            background: #ff4da6;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        /* 📸 FLOATING PHOTOS */
        .memory-photo {
            position: fixed;
            width: 150px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: popIn 0.5s ease forwards;
        }

        @keyframes popIn {
            from {
                transform: scale(0.3) rotate(-20deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div id="start-screen">
    <h1 style="color:white;">I have a surprise for you...</h1>
    <button id="start-btn">Click to Open 🎁</button>
</div>

<div id="main-content">
    <h1>Happy Birthday Lenhle 🎂</h1>

    <div class="photo-letter-wrapper">
        <div class="letter" id="letter">
            <p>
                My dearest Lenhle,<br><br>
                You mean the world to me... ❤️<br><br>
                Happy Birthday 🎂
            </p>
        </div>

        <img id="birthdayPhoto" src="pic2.jpeg">
    </div>

    <button id="doneBtn">Done Reading ❤️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
document.getElementById('start-btn').onclick = function() {

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    setTimeout(() => {
        document.getElementById('letter').classList.add('show');
        document.getElementById('birthdayPhoto').style.opacity = '0.3';

        // show button after letter appears
        document.getElementById('doneBtn').style.display = 'inline-block';
    }, 3000);
};


/* 📸 PHOTO EXPLOSION */
const photos = [
    "pic6.jpeg",
    "pic3.jpeg",
    "pic5.jpeg",
    "pic1.jpeg",
    "pic7.jpeg"
];

document.getElementById('doneBtn').onclick = function() {

    confetti({ particleCount: 300, spread: 200 });

    let i = 0;

    let interval = setInterval(() => {

        const img = document.createElement('img');
        img.src = photos[Math.floor(Math.random() * photos.length)];
        img.className = "memory-photo";

        img.style.top = Math.random() * 90 + "vh";
        img.style.left = Math.random() * 90 + "vw";

        document.body.appendChild(img);

        i++;
        if (i > 20) clearInterval(interval);

    }, 200);
};
</script>

</body>
</html>
